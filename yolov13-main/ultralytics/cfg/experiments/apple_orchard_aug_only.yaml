# Scene augmentation only (no P2, no DIoU-NMS, no loss reweight).
# Isolates the contribution of orchard-targeted data augmentation.
# Key insight: copy_paste simulates dense fruit clusters; mosaic stays default
# so P2 head (when combined in a4/a5) can converge properly.

optimizer: SGD
lr0: 0.01
lrf: 0.01
cos_lr: true
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0

# Scene-aware augmentation for apple orchard
hsv_h: 0.02
hsv_s: 0.75
hsv_v: 0.55
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
bgr: 0.0
mosaic: 1.0        # keep default — P2 head needs mosaic diversity
copy_paste: 0.3    # ↑ core: simulate dense apple clusters
mixup: 0.1         # ↑ mild regularization
close_mosaic: 15

# Default loss weights (unchanged)
box: 7.5
cls: 0.5
dfl: 1.5

# Standard NMS
iou: 0.7
nms_type: iou
max_det: 300

amp: true
val: true
plots: true
